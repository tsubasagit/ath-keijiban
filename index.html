<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>掲示板 / Keijiban</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --primary: #1f5b8c;
    --primary-dark: #174a73;
    --border: #e2e6ec;
    --text: #1f2630;
    --muted: #7a8595;
    --ok: #1e7e4f;
    --err: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { font-size: 22px; margin: 0; color: var(--primary); letter-spacing: .02em; }
  .room-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .room-bar select {
    font-size: 14px; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card); color: var(--text);
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 18px;
    box-shadow: 0 1px 2px rgba(20,40,70,.04);
  }
  input[type=text], input[type=email], input[type=password], textarea {
    width: 100%; font: inherit; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--text);
    resize: vertical;
  }
  input:focus, textarea:focus { outline: 2px solid rgba(31,91,140,.25); border-color: var(--primary); }
  textarea { min-height: 84px; }
  .actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 12px; }
  .hint { font-size: 12px; color: var(--muted); }
  .poster { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .poster b { color: var(--text); }

  button {
    font: inherit; font-weight: 600; cursor: pointer;
    border: none; padding: 10px 18px; border-radius: 10px;
    background: var(--primary); color: #fff;
    transition: background .15s, opacity .15s, border-color .15s;
  }
  button:hover:not(:disabled) { background: var(--primary-dark); }
  button:disabled { opacity: .55; cursor: default; }
  button.ghost { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  button.ghost:hover:not(:disabled) { background: #eef4f9; }
  button.logout { background: #fff; color: var(--err); border: 1px solid var(--err); padding: 8px 14px; }
  button.logout:hover:not(:disabled) { background: #fdecec; }

  /* 認証バー */
  .auth-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .auth-row input { flex: 1; min-width: 160px; }
  .auth-msg { font-size: 13px; margin-top: 10px; min-height: 1.1em; }
  .auth-msg.ok { color: var(--ok); }
  .auth-msg.err { color: var(--err); }
  .auth-in { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .auth-status { font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); flex: none; }

  .login-note { text-align: center; color: var(--muted); font-size: 14px; }
  .login-note b { color: var(--text); }

  .list { display: flex; flex-direction: column; gap: 12px; }
  .post {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .post .meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .post .who { font-weight: 700; font-size: 14px; }
  .post .when { font-size: 12px; color: var(--muted); }
  .post .body { white-space: pre-wrap; word-break: break-word; font-size: 15px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  .status { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; }
  .error { color: var(--err); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📋 掲示板</h1>
    <div class="room-bar">
      <label for="room">ルーム</label>
      <select id="room">
        <option value="general">general（雑談）</option>
        <option value="info">info（お知らせ）</option>
        <option value="dev">dev（開発）</option>
      </select>
    </div>
  </header>

  <!-- 認証バー -->
  <div class="card" id="authCard">
    <!-- 未ログイン: ログイン / 新規登録 -->
    <div id="authOut">
      <div class="auth-row">
        <input type="email" id="authEmail" placeholder="メールアドレス" autocomplete="email" />
        <input type="password" id="authPass" placeholder="パスワード" autocomplete="current-password" />
        <button class="primary" id="authLoginBtn">ログイン</button>
        <button class="ghost" id="authSignupBtn">新規登録</button>
      </div>
      <div class="auth-msg" id="authMsg"></div>
    </div>
    <!-- ログイン済み -->
    <div id="authIn" class="auth-in hidden">
      <span class="auth-status"><span class="dot"></span><span><b id="authWho"></b> でログイン中</span></span>
      <button class="logout" id="authLogoutBtn">ログアウト</button>
    </div>
  </div>

  <!-- 投稿フォーム（ログイン時のみ） -->
  <div class="card hidden" id="postCard">
    <div class="poster">投稿者: <b id="posterName">—</b></div>
    <textarea id="body" placeholder="メッセージを入力…" maxlength="2000"></textarea>
    <div class="actions">
      <span class="hint">Ctrl + Enter で投稿</span>
      <button id="postBtn">投稿する</button>
    </div>
  </div>

  <!-- 未ログイン時の案内 -->
  <div class="card login-note" id="loginNote">
    投稿するには <b>ログイン</b> してください。アカウントが無ければ「新規登録」から作成できます。
  </div>

  <div class="list" id="list"></div>
  <div class="status" id="status">読み込み中…</div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://kcfnhhcoasgculonbbtx.supabase.co";
const SUPABASE_KEY = "sb_publishable_JU-uguITndR8dzhEsXFCvw_nmWGu-wq";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);
const listEl = $("list"), statusEl = $("status");
const roomEl = $("room"), bodyEl = $("body"), btn = $("postBtn");
// 認証関連
const authOut = $("authOut"), authIn = $("authIn"), authWho = $("authWho");
const authEmail = $("authEmail"), authPass = $("authPass"), authMsg = $("authMsg");
const authLoginBtn = $("authLoginBtn"), authSignupBtn = $("authSignupBtn"), authLogoutBtn = $("authLogoutBtn");
const postCard = $("postCard"), loginNote = $("loginNote"), posterName = $("posterName");

let channel = null;
let currentUser = null;

/* ---------- 共通 ---------- */
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function formatTime(iso) {
  const d = new Date(iso);
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
// メールアドレスから表示名（@より前）を作る
function displayName(email) {
  return (email || "").split("@")[0] || "名無し";
}
function setAuthMsg(text, kind) {
  authMsg.textContent = text || "";
  authMsg.className = "auth-msg" + (kind ? " " + kind : "");
}

/* ---------- 認証 ---------- */
// ログイン状態に応じて画面を切り替える
function renderAuth(user) {
  currentUser = user;
  if (user) {
    authOut.classList.add("hidden");
    authIn.classList.remove("hidden");
    authWho.textContent = user.email;
    postCard.classList.remove("hidden");
    loginNote.classList.add("hidden");
    posterName.textContent = displayName(user.email);
  } else {
    authOut.classList.remove("hidden");
    authIn.classList.add("hidden");
    postCard.classList.add("hidden");
    loginNote.classList.remove("hidden");
  }
}
function readCreds() {
  const email = authEmail.value.trim();
  const password = authPass.value;
  if (!email || !password) { setAuthMsg("メールアドレスとパスワードを入力してください。", "err"); return null; }
  return { email, password };
}
function setAuthBusy(busy) {
  [authLoginBtn, authSignupBtn, authLogoutBtn].forEach((b) => (b.disabled = busy));
}
async function login() {
  const c = readCreds(); if (!c) return;
  setAuthBusy(true); setAuthMsg("ログイン中…");
  const { error } = await supabase.auth.signInWithPassword(c);
  setAuthBusy(false);
  if (error) { setAuthMsg("ログインエラー: " + error.message, "err"); return; }
  authPass.value = ""; setAuthMsg("");
}
async function signUp() {
  const c = readCreds(); if (!c) return;
  setAuthBusy(true); setAuthMsg("登録中…");
  const { data, error } = await supabase.auth.signUp(c);
  setAuthBusy(false);
  if (error) { setAuthMsg("登録エラー: " + error.message, "err"); return; }
  if (!data.session) setAuthMsg("確認メールを送信しました。リンクを開いて登録を完了してください。", "ok");
  else setAuthMsg("");
}
async function logout() {
  setAuthBusy(true);
  await supabase.auth.signOut();
  setAuthBusy(false);
  setAuthMsg("");
}

/* ---------- 掲示板 ---------- */
function render(rows) {
  if (!rows.length) {
    listEl.innerHTML = `<div class="empty">まだ投稿がありません。最初の一言をどうぞ。</div>`;
    return;
  }
  listEl.innerHTML = rows.map((r) => `
    <div class="post">
      <div class="meta">
        <span class="who">${escapeHtml(r.name || "名無し")}</span>
        <span class="when">${formatTime(r.created_at)}</span>
      </div>
      <div class="body">${escapeHtml(r.body)}</div>
    </div>`).join("");
}
async function load() {
  const room = roomEl.value;
  statusEl.textContent = "読み込み中…";
  statusEl.classList.remove("error");
  const { data, error } = await supabase
    .from("posts")
    .select("id,room,name,body,created_at")
    .eq("room", room)
    .order("created_at", { ascending: false })
    .limit(100);
  if (error) {
    statusEl.textContent = "読み込みエラー: " + error.message;
    statusEl.classList.add("error");
    return;
  }
  render(data);
  statusEl.textContent = `${data.length} 件の投稿 ・ ルーム「${room}」`;
}
function subscribe() {
  if (channel) supabase.removeChannel(channel);
  const room = roomEl.value;
  channel = supabase
    .channel("posts-" + room)
    .on("postgres_changes",
      { event: "INSERT", schema: "public", table: "posts", filter: `room=eq.${room}` },
      () => load())
    .subscribe();
}
async function post() {
  if (!currentUser) { setAuthMsg("投稿するにはログインしてください。", "err"); return; }
  const room = roomEl.value;
  const body = bodyEl.value.trim();
  if (!body) { bodyEl.focus(); return; }
  btn.disabled = true;
  const { error } = await supabase
    .from("posts")
    .insert({ room, name: displayName(currentUser.email), body });
  btn.disabled = false;
  if (error) {
    statusEl.textContent = "投稿エラー: " + error.message;
    statusEl.classList.add("error");
    return;
  }
  bodyEl.value = "";
  await load();
}

/* ---------- イベント ---------- */
authLoginBtn.addEventListener("click", login);
authSignupBtn.addEventListener("click", signUp);
authLogoutBtn.addEventListener("click", logout);
authPass.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });

btn.addEventListener("click", post);
bodyEl.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") post();
});
roomEl.addEventListener("change", () => { load(); subscribe(); });

/* ---------- 起動 ---------- */
const { data: { session } } = await supabase.auth.getSession();
renderAuth(session?.user || null);
supabase.auth.onAuthStateChange((_event, session) => renderAuth(session?.user || null));

load();
subscribe();
</script>
</body>
</html>
